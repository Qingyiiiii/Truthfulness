schema_version = "claim_taxonomy_config_v1.0.0"
truthfulness_taxonomy_version = "truthfulness_taxonomy_v02.1.0"
v01_import_status = "OUT_OF_SCOPE"
v01_mapping_status = "DEFERRED"

[text_storage]
inline_utf8_byte_limit = 262144
atomic_quality_warning_char_count = 5000
inline_chunk_mode = "xor"
chunk_index_origin = 0
chunk_hash_algorithm = "sha256"
parent_text_truncation_allowed = false
atomic_text_truncation_allowed = false

[permissions]
machine_gold_write = "forbidden"
machine_human_inclusion_write = "forbidden"
human_machine_verdict_write = "forbidden"
one_authorized_human_can_approve_gold = true

[label_groups.split_status]
taxonomy_version = "truthfulness_taxonomy_v02.1.0"
target = "claim_split_set_revision"
cardinality = "exactly_one_current_per_parent"
nullable = false
not_applicable_policy = "forbidden"
machine_permission = "candidate_write"
human_permission = "successor_write"
codes = ["resolved_atomic", "needs_human_split"]
display_zh = { resolved_atomic = "已完成原子拆分", needs_human_split = "需要人工拆分" }
error_codes = ["E_SPLIT_CHILD_REQUIRED", "E_SPLIT_UNRESOLVED_ELIGIBLE"]

[label_groups.checkability]
taxonomy_version = "truthfulness_taxonomy_v02.1.0"
target = "atomic_claim_revision"
cardinality = "exactly_one"
nullable = false
not_applicable_policy = "forbidden"
machine_permission = "candidate_write"
human_permission = "successor_write"
codes = ["checkable", "context_only", "not_checkable"]
display_zh = { checkable = "可核验", context_only = "仅语境依赖", not_checkable = "不可核验" }
error_codes = ["E_CHECKABLE_VERDICT_REQUIRED", "E_CONTEXT_DEPENDENCY_REQUIRED", "E_NOT_CHECKABLE_LABEL_CONFLICT"]

[label_groups.machine_verdict]
taxonomy_version = "truthfulness_taxonomy_v02.1.0"
target = "machine_claim_assessment"
cardinality = "exactly_one_current_per_eligible_atomic_claim"
nullable = false
not_applicable_policy = "omit_for_context_only"
machine_permission = "canonical_write"
human_permission = "read_only"
codes = ["supported", "refuted", "mixed", "insufficient", "unverifiable"]
display_zh = { supported = "机器候选支持", refuted = "机器候选反驳", mixed = "机器候选混合", insufficient = "机器候选证据不足", unverifiable = "机器候选无法核验" }
error_codes = ["E_MACHINE_VERDICT_SCOPE"]

[label_groups.human_gold]
taxonomy_version = "truthfulness_taxonomy_v02.1.0"
target = "gold_label"
cardinality = "at_most_one_current_per_target"
nullable = true
not_applicable_policy = "omit_until_approved"
machine_permission = "forbidden"
human_permission = "canonical_write"
codes = ["gold_supports", "gold_partially_supports", "gold_refutes", "gold_misleading", "gold_missing_context", "gold_insufficient_evidence", "gold_uncheckable"]
display_zh = { gold_supports = "黄金支持", gold_partially_supports = "黄金部分支持", gold_refutes = "黄金反驳", gold_misleading = "黄金误导性", gold_missing_context = "黄金缺失语境", gold_insufficient_evidence = "黄金证据不足", gold_uncheckable = "黄金无法核实" }
error_codes = ["E_GOLD_SUPPORT_SCOPE_MISMATCH", "E_GOLD_PARTIAL_SCOPE_REQUIRED", "E_GOLD_REFUTES_EVIDENCE_REQUIRED", "E_GOLD_MISLEADING_REASON_REQUIRED", "E_GOLD_CONTEXT_REQUIRED", "E_GOLD_SEARCH_CLOSURE_REQUIRED", "E_GOLD_UNCHECKABLE_SCOPE"]

[label_groups.inclusion_decision]
taxonomy_version = "truthfulness_taxonomy_v02.1.0"
target = "human_claim_inclusion_decision"
cardinality = "at_most_one_current_per_atomic_claim"
nullable = true
not_applicable_policy = "omit_before_human_decision"
machine_permission = "separate_recommendation_only"
human_permission = "canonical_write"
codes = ["included", "excluded", "pending"]
display_zh = { included = "包含", excluded = "排除", pending = "待定" }
error_codes = ["E_INCLUSION_WRITER_FORBIDDEN", "E_EXCLUSION_REASON_REQUIRED", "E_PENDING_AS_VERDICT", "E_INCLUSION_DATASET_GATE"]

[label_groups.source_kind]
taxonomy_version = "truthfulness_taxonomy_v02.1.0"
target = "evidence_revision"
cardinality = "exactly_one"
nullable = false
not_applicable_policy = "forbidden"
machine_permission = "candidate_write"
human_permission = "successor_write"
codes = ["official", "primary_report", "paper", "database", "high_quality_secondary", "other"]
display_zh = { official = "官方来源", primary_report = "原始报道或一手报告", paper = "学术论文", database = "结构化数据库", high_quality_secondary = "高质量二手来源", other = "其他来源" }
error_codes = ["E_SOURCE_KIND_INVALID"]

[label_groups.source_role]
taxonomy_version = "truthfulness_taxonomy_v02.1.0"
target = "claim_evidence_link"
cardinality = "exactly_one_for_evidence_or_clue"
nullable = true
not_applicable_policy = "nullable_only_when_rejected"
machine_permission = "candidate_write"
human_permission = "successor_write"
codes = ["primary_source", "secondary_source"]
display_zh = { primary_source = "原始来源", secondary_source = "次要来源" }
error_codes = ["E_SOURCE_ROLE_REQUIRED"]

[label_groups.access_status]
taxonomy_version = "truthfulness_taxonomy_v02.1.0"
target = "retrieval_attempt"
cardinality = "exactly_one"
nullable = false
not_applicable_policy = "forbidden"
machine_permission = "retriever_write"
human_permission = "read_only"
codes = ["accessible", "source_blocked", "not_found", "access_error"]
display_zh = { accessible = "可访问", source_blocked = "来源被屏蔽", not_found = "未找到", access_error = "访问错误" }
error_codes = ["E_ACCESS_STATUS_CONFLICT"]

[label_groups.use_status]
taxonomy_version = "truthfulness_taxonomy_v02.1.0"
target = "claim_evidence_link"
cardinality = "exactly_one"
nullable = false
not_applicable_policy = "omit_when_no_source_row"
machine_permission = "candidate_write"
human_permission = "successor_write"
codes = ["evidence", "clue_only", "rejected"]
display_zh = { evidence = "正式证据", clue_only = "仅线索", rejected = "已拒绝" }
error_codes = ["E_CLUE_USED_AS_EVIDENCE"]

[label_groups.evidence_strength]
taxonomy_version = "truthfulness_taxonomy_v02.1.0"
target = "claim_evidence_link"
cardinality = "exactly_one_for_formal_evidence"
nullable = true
not_applicable_policy = "null_for_clue_or_rejected"
machine_permission = "candidate_write"
human_permission = "successor_write"
codes = ["high", "medium", "low"]
display_zh = { high = "高", medium = "中", low = "低" }
error_codes = ["E_STRENGTH_NOT_APPLICABLE"]

[label_groups.evidence_relation]
taxonomy_version = "truthfulness_taxonomy_v02.1.0"
target = "claim_evidence_link"
cardinality = "exactly_one_for_evidence_or_clue"
nullable = true
not_applicable_policy = "nullable_only_when_rejected_with_reason"
machine_permission = "candidate_write"
human_permission = "successor_write"
codes = ["supports", "refutes", "context", "conflicts", "unresolved"]
display_zh = { supports = "支持", refutes = "反驳", context = "提供语境", conflicts = "来源彼此冲突", unresolved = "尚未解决" }
error_codes = ["E_EVIDENCE_RELATION_REQUIRED"]

[label_groups.evidence_availability]
taxonomy_version = "truthfulness_taxonomy_v02.1.0"
target = "evidence_availability"
cardinality = "exactly_one_per_claim_and_retrieval_batch"
nullable = false
not_applicable_policy = "omit_before_retrieval"
machine_permission = "batch_closer_write"
human_permission = "read_only"
codes = ["pending", "has_evidence", "no_evidence"]
display_zh = { pending = "待检索或待评估", has_evidence = "有证据", no_evidence = "无证据" }
error_codes = ["E_NO_EVIDENCE_WITH_OPEN_SEARCH"]

[cross_axis_rules]
source_blocked_implies_no_evidence = false
no_evidence_allows_clue_only = true
no_evidence_allows_formal_evidence = false
blocked_attempt_can_coexist_with_has_evidence = true
empty_evidence_collection_allowed = true
parent_gold_inherited_from_children = false
unresolved_split_blocks_s02 = true
